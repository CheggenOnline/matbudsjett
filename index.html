<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Murph</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="mb-apple.png">
<link rel="icon" type="image/png" sizes="192x192" href="mb-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Murph">
<meta name="theme-color" content="#ffffff">
<style>
  :root{--grønn:#0e7c5b;--lysgrønn:#3f9e4f;--krem:#f6f3ea;--mørk:#1f2d27;--gul:#e8a13c;--lilla:#7c6bb0;}
  *{box-sizing:border-box;}
  html{background:#fff;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--krem);color:var(--mørk);}
  body{position:fixed;inset:0;overflow:hidden;width:100%;}
  #app{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;box-sizing:border-box;max-width:520px;margin:0 auto;padding:calc(12px + env(safe-area-inset-top)) 16px calc(84px + env(safe-area-inset-bottom));}
  h1{font-size:22px;margin:4px 0 12px;}
  .card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .stor{font-size:40px;font-weight:800;line-height:1.1;}
  .sub{font-size:13px;color:#7a857f;}
  .bar{height:16px;border-radius:8px;background:#e7e3d8;overflow:hidden;margin:10px 0 4px;}
  .bar>div{height:100%;border-radius:8px;background:var(--lysgrønn);transition:width .4s,background .4s;}
  .knapper{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .k{border:none;border-radius:13px;padding:10px 8px;font-size:14px;font-weight:800;cursor:pointer;background:var(--grønn);color:#fff;box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .k:active{transform:translateY(2px);box-shadow:none;}
  .k small{display:block;font-weight:600;font-size:11px;opacity:.85;margin-top:1px;}
  .k.snack{background:var(--gul);}
  .k.drikke{background:#4c8fbe;}
  .k.fav{background:var(--lilla);}
  .k.egen{background:#fff;color:var(--mørk);border:2px dashed #bbb;box-shadow:none;}
  .rad{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #f0ede4;font-size:15px;}
  .rad:last-child{border-bottom:none;}
  .rad .navn{flex:1;}
  .rad .kcal{font-weight:800;white-space:nowrap;}
  .rad button{border:none;background:#eee;border-radius:10px;padding:5px 10px;font-weight:700;cursor:pointer;color:#666;}
  .tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.1);padding-bottom:max(4px,calc(env(safe-area-inset-bottom) - 14px));z-index:50;}
  .tabs::after{content:'';position:absolute;top:100%;left:0;right:0;height:220px;background:#fff;}
  .tabs button{flex:1;border:none;background:none;padding:12px 0 10px;font-size:12px;font-weight:700;color:#8a938d;cursor:pointer;}
  .tabs button.on{color:var(--grønn);}
  .tabs .ikon{display:block;font-size:22px;margin-bottom:2px;}
  input,select{font-size:16px;padding:10px 12px;border:1px solid #ddd;border-radius:12px;background:#fff;width:100%;}
  label{display:block;font-size:13px;font-weight:700;margin:12px 0 4px;color:#5a655f;}
  .primær{border:none;border-radius:14px;padding:14px;width:100%;font-size:17px;font-weight:800;background:var(--grønn);color:#fff;cursor:pointer;margin-top:14px;}
  .sekundær{border:none;border-radius:14px;padding:12px;width:100%;font-size:15px;font-weight:700;background:#e9e5da;color:var(--mørk);cursor:pointer;margin-top:10px;}
  #toast{position:fixed;bottom:calc(92px + env(safe-area-inset-bottom));left:16px;right:16px;max-width:488px;margin:0 auto;background:var(--mørk);color:#fff;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:700;display:none;z-index:60;display:none;align-items:center;justify-content:space-between;}
  #toast button{border:none;background:#fff2;color:#fff;border-radius:10px;padding:6px 12px;font-weight:800;cursor:pointer;}
  .banner{background:#eaf6e5;border:1.5px solid var(--lysgrønn);border-radius:14px;padding:12px 14px;font-size:14px;margin-bottom:14px;}
  .banner.info{background:#fdf6e7;border-color:var(--gul);}
  .to-kol{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  svg text{font-family:inherit;}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:70;display:none;align-items:flex-end;justify-content:center;}
  #modal .boks{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:75vh;overflow:auto;}
</style>
</head>
<body>
<div id="app"></div>
<div class="tabs">
  <button id="tab-hjem" class="on" onclick="vis('hjem')"><span class="ikon">🥑</span>Mat</button>
  <button id="tab-vekt" onclick="vis('vekt')"><span class="ikon">📈</span>Utvikling</button>
  <button id="tab-trening" onclick="vis('trening')"><span class="ikon">💪</span>Trening</button>
  <button id="tab-chat" onclick="vis('chat')"><span class="ikon">💬</span>Murph</button>
  <button id="tab-innst" onclick="vis('innst')"><span class="ikon">⚙️</span>Innst.</button>
</div>
<div id="toast"><span id="toastTxt"></span><button onclick="angre()">Angre</button></div>
<input id="kameraInn" type="file" accept="image/*" style="display:none" onchange="analyserBilde(this)">
<div id="modal" onclick="if(event.target===this)lukkModal()"><div class="boks"></div></div>
<script>
// ===================== Lagring =====================
const NØKKEL='mb_state_v1';
let S=null;
function last(){try{S=JSON.parse(localStorage.getItem(NØKKEL));}catch(e){S=null;}
  if(!S)S={profile:null,meals:{lite:400,middels:650,stort:900,snack:200,drikke:150},favs:[],log:{},weights:{},budget:null,budgetInfo:null,lastAdjust:null};
  if(!S.personal)S.personal={notat:'',anbefaling:'',plan:[],varsle:false};
  if(!S.murph)S.murph={meldinger:[]};
  if(S.visKnapper===undefined)S.visKnapper=true;
  if(!S.mål)S.mål={};
  if(!S.måltyper)S.måltyper={midje:true,hofte:true,nakke:true,bryst:false,lår:false,arm:false};}
function lagre(){try{localStorage.setItem(NØKKEL,JSON.stringify(S));}catch(e){}}
const iDag=()=>new Date(Date.now()-3*3600*1000).toLocaleDateString('sv-SE'); // ny dag starter kl 03:00
const nå=()=>new Date().toTimeString().slice(0,5);

// ===================== Kalorimotor =====================
function sisteVekt(){
  const ds=Object.keys(S.weights).sort();
  return ds.length?S.weights[ds[ds.length-1]]:(S.profile?S.profile.weight:null);
}
function bmr(){
  const p=S.profile; if(!p)return null;
  const w=sisteVekt()||p.weight;
  return p.sex==='m'?10*w+6.25*p.height-5*p.age+5:10*w+6.25*p.height-5*p.age-161;
}
function formelTDEE(){const b=bmr();return b?b*S.profile.activity:null;}
function underskudd(){return S.profile&&S.profile.pace===0.25?275:550;}
function gulv(){return S.profile&&S.profile.sex==='m'?1500:1200;}
function budsjett(){
  if(S.budget)return S.budget;
  const t=formelTDEE(); if(!t)return null;
  return Math.max(gulv(),Math.round((t-underskudd())/10)*10);
}
function dagsTotal(d){return (S.log[d]||[]).reduce((s,x)=>s+x.kcal,0);}

// EMA-trend av vekt
function trendSerie(){
  const ds=Object.keys(S.weights).sort();
  if(!ds.length)return [];
  const ut=[];let ema=S.weights[ds[0]];
  for(const d of ds){ema=ema+0.25*(S.weights[d]-ema);ut.push({d,v:S.weights[d],t:+ema.toFixed(2)});}
  return ut;
}
// Ukentlig justering: baklengs-utregnet forbruk fra inntak + vekttrend
function kanskjeJuster(){
  if(!S.profile)return;
  const idag=iDag();
  if(S.lastAdjust&&(new Date(idag)-new Date(S.lastAdjust))/86400000<7)return;
  const vindu=14;
  const fra=new Date(Date.now()-vindu*86400000).toLocaleDateString('sv-SE');
  const loggDager=Object.keys(S.log).filter(d=>d>=fra&&d<idag&&S.log[d].length);
  const vektDager=Object.keys(S.weights).filter(d=>d>=fra).sort();
  if(loggDager.length<5||vektDager.length<3)return;
  const spennDager=(new Date(vektDager[vektDager.length-1])-new Date(vektDager[0]))/86400000;
  if(spennDager<6)return;
  const tr=trendSerie().filter(p=>p.d>=fra);
  const slope=(tr[tr.length-1].t-tr[0].t)/spennDager; // kg per dag
  const snittInntak=loggDager.reduce((s,d)=>s+dagsTotal(d),0)/loggDager.length;
  let tdee=snittInntak-slope*7700;
  const forrige=S.budgetInfo&&S.budgetInfo.tdee?S.budgetInfo.tdee:formelTDEE();
  tdee=Math.round((0.5*tdee+0.5*forrige)/10)*10; // demp svingninger
  let nytt=Math.max(gulv(),Math.round((tdee-underskudd())/10)*10);
  if(S.budget)nytt=Math.max(S.budget-300,Math.min(S.budget+300,nytt)); // maks ±300 per justering
  const gammelt=budsjett();
  S.budget=nytt;S.budgetInfo={updated:idag,tdee,source:'auto'};S.lastAdjust=idag;
  S.sisteJusteringMelding=`📊 Ukentlig justering: kroppen din bruker ca. ${tdee} kcal/dag. Nytt budsjett: ${nytt} kcal${nytt<gammelt?' (litt ned)':nytt>gammelt?' (litt opp)':''}. Du styrer dette – bare fortsett å logge!`;
  lagre();
}

// ===================== Visninger =====================
let aktivFane='hjem';
let avansertÅpen=false;
window.målÅpen=false;
let dagensÅpen=false;
let statusRådVenter=false;
function vis(f){aktivFane=f;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+f).classList.add('on');
  render();
}
function render(){
  if(!S.profile){renderOnboarding();return;}
  kanskjeJuster();
  if(aktivFane==='hjem')renderHjem();
  else if(aktivFane==='vekt')renderVekt();
  else if(aktivFane==='trening')renderTrening();
  else if(aktivFane==='chat')renderChat();
  else renderInnst();
}
function esc(s){return String(s).replace(/</g,'&lt;');}

function renderHjem(){
  const b=budsjett(), brukt=dagsTotal(iDag()), igjen=b-brukt;
  const pst=Math.min(100,Math.round(100*brukt/b));
  const farge=igjen>=0?(pst<80?'#3f9e4f':'#e8a13c'):'#7c6bb0';
  const status=igjen>=0?`<span class="stor">${igjen}</span> <span style="font-size:18px;font-weight:700;">kcal igjen i dag</span>`
    :`<span class="stor" style="color:var(--lilla);">${-igjen}</span> <span style="font-size:18px;font-weight:700;">over – helt ok, i morgen er ny dag 💜</span>`;
  let h=`<h1>🥑 Murph</h1>`;
  if(S.sisteJusteringMelding){h+=`<div class="banner">${S.sisteJusteringMelding} <button style="border:none;background:none;font-weight:800;cursor:pointer;color:var(--grønn);" onclick="S.sisteJusteringMelding=null;lagre();render()">OK</button></div>`;}
  h+=smellSjekk();
  if(!Object.keys(S.weights).length){h+=`<div class="banner info">🏖️ Ingen veiinger ennå – null stress. Budsjettet er formelbasert, og den smarte justeringen starter av seg selv når du begynner å veie deg.</div>`;}
  h+=`<div class="card"><div>${status}</div>
    <div class="bar"><div style="width:${pst}%;background:${farge};"></div></div>
    <div class="sub">Budsjett: ${b} kcal · Logget: ${brukt} kcal${S.budgetInfo&&S.budgetInfo.source==='auto'?' · 📊 auto-justert':''}</div>
    ${S.statusRåd&&S.statusRåd.n&&S.statusRåd.n.startsWith(iDag())?`<div class="sub" style="margin-top:8px;color:var(--grønn);font-weight:600;">🤖 ${esc(S.statusRåd.t)} <button style="border:none;background:none;color:var(--lilla);font-weight:800;cursor:pointer;padding:0;font-size:13px;text-decoration:underline;" onclick="lagMatplan()">👉 Trykk her for konkret matplan</button></div>`:''}</div>`;
  const m=S.meals;
  h+=`<div class="card"><div class="sub" style="margin-bottom:8px;font-weight:700;">Trykk én gang – ferdig logget:</div>
    <div class="knapper">
    ${S.visKnapper?`<button class="k" onclick="loggMat('Lite måltid',${m.lite})">🍽️ Lite måltid<small>${m.lite} kcal</small></button>
    <button class="k" onclick="loggMat('Middels måltid',${m.middels})">🍽️ Middels måltid<small>${m.middels} kcal</small></button>
    <button class="k" onclick="loggMat('Stort måltid',${m.stort})">🍽️ Stort måltid<small>${m.stort} kcal</small></button>
    <button class="k snack" onclick="loggMat('Snack',${m.snack})">🍪 Snack<small>${m.snack} kcal</small></button>
    <button class="k drikke" onclick="loggMat('Drikke',${m.drikke})">🥤 Drikke<small>${m.drikke} kcal</small></button>
    ${S.favs.map((f,i)=>`<button class="k fav" onclick="loggMat('${esc(f.name).replace(/'/g,"\\'")}',${f.kcal})">⭐ ${esc(f.name)}<small>${f.kcal} kcal</small></button>`).join('')}`:''}
    ${aiNøkkel()?`<button class="k" style="background:#7c6bb0;" onclick="åpneAiModal()">🤖 Beskriv måltid<small>Claude teller kcal</small></button>`:''}
    <button class="k" style="background:#5a5f9e;" onclick="kameraKlikk()">📷 Ta / velg bilde<small>Claude teller kcal</small></button>
    </div></div>`;
  if(S.personal&&S.personal.plan&&S.personal.plan.length){
    const nm=minutter(nå());
    let nesteFunnet=false;
    h+=`<div class="card"><div class="sub" style="font-weight:700;margin-bottom:4px;">🗓️ Måltidsplan</div>`;
    h+=S.personal.plan.map(x=>{
      const passert=minutter(x.t)+45<nm;
      const neste=!passert&&!nesteFunnet&&(nesteFunnet=true);
      return `<div class="rad" style="${passert?'opacity:.4;':''}"><span class="sub" style="min-width:44px;${neste?'font-weight:800;color:var(--grønn);':''}">${x.t}</span><span class="navn" style="${neste?'font-weight:800;':''}">${neste?'👉 ':''}${esc(x.navn)}</span></div>`;
    }).join('');
    h+=`</div>`;
  }
  const dagens=S.log[iDag()]||[];
  h+=`<div class="card"><div class="sub" style="font-weight:700;margin-bottom:4px;">I dag (${dagens.length} ${dagens.length===1?'post':'poster'} · ${dagsTotal(iDag())} kcal)</div>`;
  const fra=dagensÅpen?0:Math.max(0,dagens.length-3);
  h+=dagens.length?dagens.map((x,i)=>i<fra?'':`<div class="rad"><span class="sub">${x.t}</span><span class="navn">${esc(x.name)}</span><span class="kcal">${x.kcal}</span><button onclick="slettPost(${i})">✕</button></div>`).join('')
    :`<div class="sub" style="padding:8px 0;">Ingenting logget ennå i dag. Ett trykk, så er du i gang! 👆</div>`;
  if(dagens.length>3)h+=`<button class="sekundær" style="margin-top:8px;" onclick="dagensÅpen=!dagensÅpen;render()">${dagensÅpen?'▴ Vis færre':'▾ Vis alle ('+dagens.length+')'}</button>`;
  h+=`</div>`;
  if(S.dagPlan&&S.dagPlan.d===iDag()&&S.dagPlan.poster&&S.dagPlan.poster.length){
    h+=`<div class="card"><div class="sub" style="font-weight:700;margin-bottom:4px;">🍽️ Matplan for resten av dagen</div>`;
    if(S.dagPlan.kommentar)h+=`<div class="sub" style="margin-bottom:4px;">${esc(S.dagPlan.kommentar)}</div>`;
    h+=S.dagPlan.poster.map(x=>`<div class="rad"><span class="sub" style="min-width:46px;">${esc(x.t)}</span><span class="navn">${esc(x.tekst)}</span><span class="kcal">${x.kcal?x.kcal:''}</span></div>`).join('');
    h+=`<button class="sekundær" style="margin-top:8px;" onclick="S.dagPlan=null;lagre();render()">Fjern planen</button></div>`;
  }
  document.getElementById('app').innerHTML=h;
}

const MÅLDEF=[
  {id:'midje',navn:'Midje',hint:'Mål ved navlen, avslappet mage'},
  {id:'hofte',navn:'Hofte',hint:'Rundt det bredeste punktet'},
  {id:'nakke',navn:'Nakke',hint:'Rett under strupehodet'},
  {id:'bryst',navn:'Bryst',hint:'Rundt det bredeste, avslappet'},
  {id:'lår',navn:'Lår',hint:'Øverst, rundt det tykkeste'},
  {id:'arm',navn:'Overarm',hint:'Midt på, avslappet arm'}];
let utvViser='vekt';
function aktiveMål(){return MÅLDEF.filter(m=>S.måltyper[m.id]);}
function målSerie(id){const ds=Object.keys(S.mål).sort();return ds.filter(d=>S.mål[d]&&S.mål[d][id]!=null).map(d=>({d,v:S.mål[d][id]}));}
function kfpForDato(d){
  const m=S.mål[d];if(!m||!m.midje||!m.nakke||!S.profile)return null;
  const h=S.profile.height;let v;
  if(S.profile.sex==='m'){if(m.midje<=m.nakke)return null;v=495/(1.0324-0.19077*Math.log10(m.midje-m.nakke)+0.15456*Math.log10(h))-450;}
  else{if(!m.hofte||m.midje+m.hofte<=m.nakke)return null;v=495/(1.29579-0.35004*Math.log10(m.midje+m.hofte-m.nakke)+0.221*Math.log10(h))-450;}
  return (v>2&&v<70)?+v.toFixed(1):null;
}
function kfpSerie(){return Object.keys(S.mål).sort().map(d=>({d,v:kfpForDato(d)})).filter(x=>x.v!=null);}
function sisteMål(id){const s2=målSerie(id);return s2.length?s2[s2.length-1].v:null;}
function lagreMål(){
  const d=iDag();const m=Object.assign({},S.mål[d]||{});let noe=false;
  aktiveMål().forEach(x=>{
    const el=document.getElementById('mål-'+x.id);if(!el)return;
    const v=parseFloat(el.value);
    if(v>10&&v<250){m[x.id]=v;noe=true;}
  });
  if(!noe){alert('Fyll inn minst ett mål 🙂');return;}
  S.mål[d]=m;lagre();render();toast('Kroppsmål lagret! 📏');
}
function slettMålDag(d){if(confirm('Slette målingene for '+d+'?')){delete S.mål[d];lagre();render();}}
function farge3(v,gulFra,oransjeFra){return v<gulFra?'#3f9e4f':v<oransjeFra?'#e8a13c':'#e07030';}
function pilFor(serie){if(serie.length<2)return '';const diff=serie[serie.length-1].v-serie[serie.length-2].v;if(Math.abs(diff)<0.05)return ' →';return diff<0?' ↓':' ↑';}
function nøkkeltall(){
  if(!S.profile)return '';
  const p=S.profile,v=sisteVekt(),hm=p.height/100;
  const rader=[];
  if(v){const bmi=+(v/(hm*hm)).toFixed(1);rader.push(['BMI',bmi,farge3(bmi,25,30),'']);}
  const mi=sisteMål('midje'),ho=sisteMål('hofte');
  if(mi&&ho){const whr=+(mi/ho).toFixed(2);rader.push(['Midje/hofte',whr,farge3(whr,p.sex==='m'?0.9:0.8,p.sex==='m'?1.0:0.85),pilFor(målSerie('midje'))]);}
  if(mi){const whtr=+(mi/p.height).toFixed(2);rader.push(['Midje/høyde',whtr,farge3(whtr,0.5,0.6),'']);}
  const kfp=kfpSerie();
  if(kfp.length){const k=kfp[kfp.length-1].v;rader.push(['Fettprosent (est.)',k+' %',farge3(k,p.sex==='m'?20:30,p.sex==='m'?25:35),pilFor(kfp)]);}
  if(!rader.length)return '';
  return `<div class="card"><div class="sub" style="font-weight:700;margin-bottom:4px;">📊 Nøkkeltall</div>`
    +rader.map(r=>`<div class="rad"><span class="navn">${r[0]}</span><span class="kcal" style="color:${r[2]};">${r[1]}${r[3]}</span></div>`).join('')
    +`<div class="sub" style="margin-top:6px;">Grønn = fin sone · fettprosent er US Navy-estimat fra målene dine.</div></div>`;
}
function grafEnkel(serie,enhet){
  const pts=serie.slice(-40);
  if(pts.length===1)return `<div class="sub" style="margin-top:8px;">Første måling registrert (${pts[0].v} ${enhet}) – grafen kommer etter neste! 🌱</div>`;
  const W=440,H=160,P=14;
  let min=Math.min(...pts.map(p=>p.v)),max=Math.max(...pts.map(p=>p.v));
  if(max-min<2){const m=(max+min)/2;min=m-1;max=m+1;}
  const x=i=>P+(W-2*P)*(pts.length===1?0.5:i/(pts.length-1));
  const y=v=>H-P-(H-2*P)*((v-min)/(max-min));
  const linje=pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
  const prikker=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="4" fill="#0e7c5b"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;margin-top:10px;">

function inntaksGraf(){
  const dager=[...Array(14)].map((_,i)=>new Date(Date.now()-(13-i)*86400000).toLocaleDateString('sv-SE'));
  const verdier=dager.map(d=>dagsTotal(d));
  if(!verdier.some(v=>v>0))return `<div class="card"><div class="sub" style="font-weight:700;">🍽️ Inntak siste 14 dager</div><div class="sub" style="margin-top:6px;">Ingen logget mat ennå – grafen dukker opp når du logger. 🙂</div></div>`;
  const b=budsjett()||2000;
  const W=440,H=170,P=16;
  const max=Math.max(b*1.15,...verdier);
  const bw=(W-2*P)/14;
  const y=v=>H-P-(H-2*P)*(v/max);
  const stolper=verdier.map((v,i)=>{
    if(!v)return '';
    const farge=v<=b?'#3f9e4f':'#7c6bb0';
    return `<rect x="${(P+i*bw+2).toFixed(1)}" y="${y(v).toFixed(1)}" width="${(bw-4).toFixed(1)}" height="${(H-P-y(v)).toFixed(1)}" rx="3" fill="${farge}"/>`;
  }).join('');
  const bl=y(b).toFixed(1);
  return `<div class="card"><div class="sub" style="font-weight:700;">🍽️ Inntak siste 14 dager</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;margin-top:8px;">
    ${stolper}
    <line x1="${P}" y1="${bl}" x2="${W-P}" y2="${bl}" stroke="#0e7c5b" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="${W-P}" y="${bl-5}" font-size="11" fill="#0e7c5b" text-anchor="end" font-weight="700">budsjett ${b}</text>
    <text x="${P}" y="${H-2}" font-size="10" fill="#999">${dager[0].slice(5)}</text>
    <text x="${W-P}" y="${H-2}" font-size="10" fill="#999" text-anchor="end">i dag</text></svg>
    <div class="sub">Grønn stolpe = innenfor budsjett · lilla = over · stiplet strek = budsjettet ditt</div></div>`;
}
function graf(tr){
  const pts=tr.slice(-60);
  const W=440,H=160,P=14;
  const alle=pts.flatMap(p=>[p.v,p.t]);
  let min=Math.min(...alle),max=Math.max(...alle);
  if(max-min<2){const m=(max+min)/2;min=m-1;max=m+1;}
  const x=i=>P+(W-2*P)*(pts.length===1?0.5:i/(pts.length-1));
  const y=v=>H-P-(H-2*P)*((v-min)/(max-min));
  const linje=pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(p.t).toFixed(1)}`).join(' ');
  const prikker=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="3" fill="#b9c4bd"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;margin-top:10px;">
    <text x="${P}" y="12" font-size="10" fill="#999">${max.toFixed(1)}</text>
    <text x="${P}" y="${H-2}" font-size="10" fill="#999">${min.toFixed(1)}</text>
    ${prikker}<path d="${linje}" fill="none" stroke="#0e7c5b" stroke-width="3" stroke-linecap="round"/></svg>
    <div class="sub">Prikker = veiinger · grønn linje = trenden din (den som teller)</div>`;
}

async function aktiverMedKode(){
  const kode=document.getElementById('ai-kode').value.trim();
  if(!kode){alert('Skriv inn koden 🙂');return;}
  try{
    const rå=Uint8Array.from(atob(KODEBLOB),c=>c.charCodeAt(0));
    const salt=rå.slice(0,16),iv=rå.slice(16,28),data=rå.slice(28);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(kode),'PBKDF2',false,['deriveKey']);

    const klar=JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv},k,data)));
    localStorage.setItem(AINØKKEL,klar.ai);

function skalerBilde(f){return new Promise((ok,feil)=>{
  const img=new Image();
  img.onload=()=>{const maks=1024,sk=Math.min(1,maks/Math.max(img.width,img.height));
    const c=document.createElement('canvas');c.width=Math.round(img.width*sk);c.height=Math.round(img.height*sk);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    const b64=c.toDataURL('image/jpeg',0.8).split(',')[1];
    URL.revokeObjectURL(img.src);ok(b64);};
  img.onerror=()=>feil(new Error('Klarte ikke lese bildet'));
  img.src=URL.createObjectURL(f);});}

function minutter(t){return +t.slice(0,2)*60+ +t.slice(3,5);}
function smellSjekk(){
  const P=S.personal;if(!P||!P.varsle)return '';
  const d=iDag(),nm=minutter(nå());
  const logg=S.log[d]||[];
  const sisteLoggM=logg.length?minutter(logg[logg.length-1].t):null;
  if(P.plan&&P.plan.length){
    const forbi=P.plan.filter(x=>minutter(x.t)+45<=nm);
    if(forbi.length){
      const siste=forbi[forbi.length-1];
      if(sisteLoggM===null||sisteLoggM<minutter(siste.t)-30){
        kanskjeVarsle(d+'-plan-'+siste.t,'⏰ '+siste.navn+' ('+siste.t+') er ikke logget – spis noe nå, så unngår du kveldssmellen!');
        return '<div class="banner info">⏰ <b>'+esc(siste.navn)+' kl. '+siste.t+'</b> er ikke logget ennå. Litt mat nå = mindre smell i kveld! 💪</div>';
      }
    }
  }
  if(sisteLoggM!==null&&nm-sisteLoggM>270&&nm>=540&&nm<=1320){
    kanskjeVarsle(d+'-gap-'+Math.floor(nm/60),'⏰ Over 4,5 timer siden forrige måltid – på tide med litt påfyll!');
    return '<div class="banner info">⏰ Over 4,5 timer siden forrige måltid. Litt påfyll nå gjør kvelden mye lettere! 🙂</div>';
  }
  return '';
}

  S.sisteVarsel=nk;lagre();
  try{if('Notification' in window&&Notification.permission==='granted')new Notification('Murph',{body:tekst});}catch(e){}
}

  +'MIN INFORMASJON (sammendrag om brukeren som DU vedlikeholder): '+(S.personal.notat||'(tomt ennå)')+'\n\n'
  +'DATA NÅ: '+(p.sex==='m'?'Mann':'Kvinne')+', '+p.age+' år, '+p.height+' cm, siste vekt '+(sisteVekt()||p.weight)+' kg. Tempo: '+p.pace+' kg/uke. Dagsbudsjett: '+budsjett()+' kcal. Spist i dag: '+dagsTotal(d)+' kcal ('+logg+'). Vekt: '+trend+'. Inntak siste 7 dager (kcal): '+inntak+'. Kroppsmål: '+kroppsmål+(kfp2.length?'. Estimert fettprosent: '+kfp2[kfp2.length-1].v+' %':'')+'. Spiseplan: '+plan+'. Anbefaling vist i appen: '+(S.personal.anbefaling||'(ingen)')+'\n\n'
  +'DU KAN GJENNOMFØRE ENDRINGER I APPEN: Når dere blir enige om en endring, eller du lærer noe varig om brukeren, avslutt svaret med en egen siste linje: @@ENDRING@@{...} der {...} er gyldig JSON med ett eller flere felt: "minInfo" (skriv HELE det oppdaterte sammendraget om brukeren på nytt), "plan" (full spiseplan som [{"t":"HH:MM","navn":"..."}]), "pace" (0.25 eller 0.5 kg/uke), "varsle" (true/false), "anbefaling" (kort råd som vises i appen). Forklar alltid i selve svaret hva du endrer og hvorfor. Ingen @@ENDRING@@-linje ellers.';
}
function brukEndringer(txt){
  const i=txt.indexOf('@@ENDRING@@');
  if(i<0)return {ren:txt.trim(),oppsummering:null};
  const ren=txt.slice(0,i).trim(),deler=[];
  try{
    const rest=txt.slice(i+11).replace(/```/g,'').trim();
    const mm=rest.match(/\{[\s\S]*\}/);
    if(mm){
      const obj=JSON.parse(mm[0]);
      if(typeof obj.minInfo==='string'&&obj.minInfo.trim()){S.personal.notat=obj.minInfo.trim().slice(0,1500);deler.push('Min informasjon');}
      if(Array.isArray(obj.plan)){
        const pl=obj.plan.map(x=>({t:String(x.t||'').slice(0,5),navn:String(x.navn||'').slice(0,40)})).filter(x=>/^\d\d:\d\d$/.test(x.t)&&x.navn);
        if(pl.length){S.personal.plan=pl.sort((a,b)=>a.t<b.t?-1:1);deler.push('spiseplanen');}
      }
      if(obj.pace===0.25||obj.pace===0.5){S.profile.pace=obj.pace;deler.push('tempo → '+String(obj.pace).replace('.',',')+' kg/uke');}
      if(typeof obj.varsle==='boolean'){S.personal.varsle=obj.varsle;deler.push('varsler '+(obj.varsle?'på':'av'));}
      if(typeof obj.anbefaling==='string'&&obj.anbefaling.trim()){S.personal.anbefaling=obj.anbefaling.trim().slice(0,500);deler.push('anbefalingen');}
      if(Array.isArray(obj.logg)){
        const poster=obj.logg.map(x=>({navn:String(x.navn||'').slice(0,60),kcal:Math.round(+x.kcal)})).filter(x=>x.navn&&x.kcal>0);
        if(poster.length){
          const d=iDag();if(!S.log[d])S.log[d]=[];
          const start=S.log[d].length;
          for(const x of poster)S.log[d].push({t:nå(),name:x.navn,kcal:x.kcal});
          sisteLoggIdx=start;sisteLoggAntall=poster.length;
          deler.push('loggførte '+poster.length+(poster.length>1?' måltider':' måltid')+' ('+poster.reduce((a,x)=>a+x.kcal,0)+' kcal)');
        }
      }
      lagre();
    }
  }catch(e){}
  return {ren:ren||'Da er det oppdatert! ✅',oppsummering:deler.length?deler.join(' · '):null};
}
let murphOpptatt=false;
async function sendMurph(){
  if(murphOpptatt)return;
  const inn=document.getElementById('chatInn');
  const tekst=(inn.value||'').trim();
  if(!tekst){inn.focus();return;}
  S.murph.meldinger.push({r:'u',t:tekst});
  if(S.murph.meldinger.length>200)S.murph.meldinger=S.murph.meldinger.slice(-200);
  lagre();renderChat();
  murphOpptatt=true;
  const vent=document.getElementById('chatVenter');if(vent)vent.style.display='block';
  const kn=document.getElementById('chatSend');if(kn)kn.disabled=true;
  try{
    const hist=S.murph.meldinger.filter(m=>m.r!=='s').slice(-30).map(m=>({role:m.r==='u'?'user':'assistant',content:m.t}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{
      'x-api-key':aiNøkkel(),'anthropic-version':'2023-06-01','content-type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:murphSystem(),messages:hist})});
    if(res.status===401||res.status===403)throw new Error('Ugyldig API-nøkkel – sjekk Innst.');
    if(res.status===429)throw new Error('For mange meldinger på kort tid – vent litt');
    if(!res.ok)throw new Error('API-feil ('+res.status+')');
    const data=await res.json();
    const txt=(data.content&&data.content[0]&&data.content[0].text)||'';
    const e=brukEndringer(txt);
    S.murph.meldinger.push({r:'m',t:e.ren});
    if(e.oppsummering){S.murph.meldinger.push({r:'s',t:'✅ Murph oppdaterte: '+e.oppsummering});oppdaterStatusRåd(true);}
  }catch(err){
    S.murph.meldinger.push({r:'s',t:'⚠️ '+((err&&err.message)||'Noe gikk galt – prøv igjen')});
  }
  murphOpptatt=false;lagre();renderChat();
}

function slettPost(i){const d=iDag();S.log[d].splice(i,1);lagre();render();oppdaterStatusRåd(true);}
function nyEgen(){
  const navn=prompt('Hva spiste du?');if(!navn)return;
  const kcal=parseInt(prompt('Omtrent hvor mange kalorier? (gjett – omtrent er godt nok!)'),10);if(!kcal)return;
  if(confirm('Lagre «'+navn+'» som favorittknapp?'))S.favs.push({name:navn,kcal});
  loggMat(navn,kcal);
}
function slettFav(i){S.favs.splice(i,1);lagre();render();}
function nyFavKnapp(){
  const navn=prompt('Navn på knappen (f.eks. Havregrøt):');if(!navn)return;
  const kcal=parseInt(prompt('Kalorier for ett trykk:'),10);if(!kcal)return;
  S.favs.push({name:navn.trim(),kcal});lagre();render();toast('Knapp lagt til ⭐');
}
function lagreVekt(){
  const v=parseFloat(document.getElementById('vektInn').value);
  if(!v||v<30||v>350){alert('Sjekk tallet 🙂');return;}
  S.weights[iDag()]=v;lagre();render();toast('Vekt lagret! 📈');
}
function slettVekt(d){delete S.weights[d];lagre();render();}
function lagreProfil(){
  S.profile={height:+document.getElementById('i-h').value,weight:+document.getElementById('i-w').value,age:+document.getElementById('i-a').value,
    sex:document.getElementById('i-s').value,activity:+document.getElementById('i-akt').value,pace:+document.getElementById('i-tempo').value};
  S.budget=null;S.budgetInfo=null; // profilendring nullstiller til formel; auto tar over igjen
  lagre();toast('Profil lagret ✅');render();
}
function lagreMåltider(){
  S.meals={lite:+document.getElementById('m-lite').value||400,middels:+document.getElementById('m-middels').value||650,stort:+document.getElementById('m-stort').value||900,snack:+document.getElementById('m-snack').value||200,drikke:+document.getElementById('m-drikke').value||150};
  lagre();toast('Knapper oppdatert ✅');render();
}
function eksporter(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='matbudsjett-backup-'+iDag()+'.json';a.click();
}
function importer(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const ny=JSON.parse(r.result);if(ny&&ny.log&&ny.meals){S=ny;if(!S.personal)S.personal={notat:'',anbefaling:'',plan:[],varsle:false};if(!S.murph)S.murph={meldinger:[]};lagre();render();toast('Backup importert ✅');}else alert('Ugyldig fil');}catch(e){alert('Klarte ikke lese filen');}};
  r.readAsText(f);
}
function nullstill(){if(confirm('Slette ALT? Dette kan ikke angres (ta backup først!).')){localStorage.removeItem(NØKKEL);last();render();}}
let toastTimer=null;
function toast(t){
  const el=document.getElementById('toast');
  document.getElementById('toastTxt').textContent=t;
  el.style.display='flex';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.display='none';},3500);
}

// ===================== Dra-ned-for-å-oppdatere =====================
let ptrY=null;
document.addEventListener('touchstart',e=>{ptrY=(document.getElementById('app').scrollTop<=0&&document.getElementById('modal').style.display!=='flex')?e.touches[0].clientY:null;},{passive:true});
document.addEventListener('touchmove',e=>{
  if(ptrY===null)return;
  if(e.touches[0].clientY-ptrY>90){
    ptrY=null;
    const el=document.createElement('div');
    el.textContent='🔄 Oppdaterer…';
    el.style.cssText='position:fixed;top:calc(14px + env(safe-area-inset-top));left:0;right:0;text-align:center;font-weight:800;font-size:15px;z-index:80;color:var(--grønn);';
    document.body.appendChild(el);
    setTimeout(()=>location.reload(),350);
  }
},{passive:true});
document.addEventListener('touchend',()=>{ptrY=null;},{passive:true});

// ===================== Oppstart =====================
last();
render();
oppdaterStatusRåd(false);
setInterval(()=>{if(aktivFane==='hjem')render();},60000);
setInterval(()=>oppdaterStatusRåd(false),1800000);
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState!=='visible')return;
  if(performance.now()>6*3600*1000){location.reload();return;}
  render();
});
</script>
